<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charterhouse</title>

    <style>
        body {
            margin: 0;
            font-family: "Georgia", serif;
            background-color: #ffffff;
            color: #1a1a1a;
        }

        header {
            background-color: #0b1f3a;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 34px;
        }

        header p {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #0b1f3a;
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 450px;
            border: none;
            border-radius: 8px;
        }

        .notice {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        footer {
            background-color: #0b1f3a;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        footer a {
            color: #c5d9ff;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>Charterhouse</h1>
    <p>Powered by YouTube API Services</p>
</header>

<div class="container">

    <h2>Featured Video</h2>

    <!-- ✅ CORRECT WORKING YOUTUBE EMBED -->
    <iframe 
        src="https://www.youtube.com/embed/IhELmzuM4Dc"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>

    <p class="notice">
        This website integrates content using YouTube API Services.
    </p>

</div>

<footer>
    <!-- ✅ Privacy Policy link -->
    <a href="https://charterhouseit.github.io/charterhouse-privacy/" target="_blank">
        Privacy Policy
    </a>
    |
    <a href="mailto:webmaster@charterhouse.org.uk">
        Contact
    </a>
</footer>

</body>
</html>
